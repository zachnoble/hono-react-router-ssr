name: Migrate DB

on:
    workflow_call:

jobs:
    migrate-db:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        permissions:
            contents: read
            id-token: write
        env:
            DB_URL: ${{ secrets.DB_URL }}
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - run: bun install

            - name: Run Migrations
              run: bun run migrate
