services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile.dev
        ports:
            - '${BACKEND_PORT}:${BACKEND_PORT}'
        env_file:
            - .env
        environment:
            - NODE_ENV=development
            - PORT=${BACKEND_PORT}
            - VALKEY_URL=valkey://valkey:6379
        volumes:
            - ./backend:/app
            - /app/node_modules
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
            valkey:
                condition: service_healthy
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        ports:
            - '${FRONTEND_PORT}:${FRONTEND_PORT}'
        env_file:
            - .env
        environment:
            - NODE_ENV=development
            - PORT=${FRONTEND_PORT}
        volumes:
            - ./frontend:/app
            - /app/node_modules
        networks:
            - app-network
        restart: unless-stopped

    postgres:
        image: postgres:17-alpine
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=postgres
            - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    valkey:
        image: valkey/valkey:8-alpine
        ports:
            - '${CACHE_PORT}:${CACHE_PORT}'
        volumes:
            - valkey_data:/data
        networks:
            - app-network
        healthcheck:
            test: ['CMD', 'valkey-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5
        restart: unless-stopped

volumes:
    postgres_data:
    valkey_data:

networks:
    app-network:
        driver: bridge
